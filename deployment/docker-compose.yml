# Docker Compose - Run entire PeerConnect stack locally
# Usage: docker-compose up

version: '3.8'

services:
  # Signaling Server (WebSocket backend)
  signaling:
    build: .
    container_name: peerconnect-signaling
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - peerconnect-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Web Server (Nginx serving frontend + proxying WebSocket)
  web:
    image: nginx:alpine
    container_name: peerconnect-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./webapp/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - signaling
    restart: unless-stopped
    networks:
      - peerconnect-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  peerconnect-network:
    driver: bridge

# Volume for persistent data (optional)
volumes:
  signaling-logs:
    driver: local
