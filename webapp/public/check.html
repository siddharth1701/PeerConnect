<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeerConnect System Check</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #1a1a2e 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
      background: linear-gradient(135deg, #fff 0%, #e94560 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin-left: auto;
    }

    .status-working {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }

    .status-enabled {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid #10b981;
    }

    .status-disabled {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .status-warning {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      border: 1px solid #f59e0b;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-label {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 500;
    }

    .item-value {
      font-size: 13px;
      color: #94a3b8;
      text-align: right;
      font-family: 'Courier New', monospace;
    }

    .endpoint-list {
      list-style: none;
      font-size: 12px;
    }

    .endpoint-list li {
      padding: 8px 0;
      color: #cbd5e1;
      border-bottom: 1px solid rgba(30, 41, 59, 0.3);
    }

    .endpoint-list li:last-child {
      border-bottom: none;
    }

    .endpoint-method {
      display: inline-block;
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      margin-right: 8px;
      min-width: 35px;
      text-align: center;
    }

    .status-full-table {
      background: rgba(31, 41, 55, 0.8);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      margin-top: 30px;
    }

    .status-full-table h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #e94560;
    }

    .feature-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      border-left: 3px solid #1e293b;
    }

    .feature-row.working {
      border-left-color: #10b981;
    }

    .feature-row.disabled {
      border-left-color: #ef4444;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 500;
      color: #e0e7ff;
    }

    .feature-details {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .refresh-btn {
      display: block;
      margin: 30px auto;
      padding: 12px 24px;
      background: linear-gradient(135deg, #e94560 0%, #ff6b81 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin: 20px 0;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      font-size: 18px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(233, 69, 96, 0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .timestamp {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 22px;
      }

      .card, .status-full-table {
        padding: 16px;
      }

      .item-value {
        text-align: right;
        word-break: break-word;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 PeerConnect System Diagnostics</h1>
    <p class="subtitle">Real-time health check and endpoint status</p>

    <div id="content" class="loading">
      <div class="spinner"></div>
      Checking system status...
    </div>

    <button class="refresh-btn" onclick="loadCheck()">🔄 Refresh Status</button>
  </div>

  <script>
    const SIGNALING_SERVER = window.location.protocol === 'https:'
      ? `wss://${window.location.hostname}:8080`
      : `ws://${window.location.hostname}:8080`;

    async function loadCheck() {
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Checking system status...</div>';

      try {
        // Use webapp proxy endpoint to avoid CORS issues with self-signed certificates
        const response = await fetch('/api/check');

        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }

        const data = await response.json();
        renderStatus(data);
      } catch (error) {
        contentDiv.innerHTML = `
          <div class="error">
            <strong>❌ Connection Error</strong><br>
            Unable to reach signaling server<br>
            <small>${error.message}</small><br>
            <small style="margin-top: 8px; display: block; opacity: 0.7;">Make sure the signaling server is running on port 8080</small>
          </div>
        `;
      }
    }

    function renderStatus(data) {
      const contentDiv = document.getElementById('content');

      let html = `
        <div class="grid">
          <div class="card">
            <h2>
              🌐 Server Status
              <span class="status-badge status-working">WORKING</span>
            </h2>
            <div class="item">
              <span class="item-label">Protocol</span>
              <span class="item-value">${data.protocol}</span>
            </div>
            <div class="item">
              <span class="item-label">Port</span>
              <span class="item-value">${data.port}</span>
            </div>
            <div class="item">
              <span class="item-label">Active Rooms</span>
              <span class="item-value">${data.features.rooms.active_rooms}</span>
            </div>
            <div class="item">
              <span class="item-label">Connected Clients</span>
              <span class="item-value">${data.endpoints['/signal'].clients_connected}</span>
            </div>
          </div>

          <div class="card">
            <h2>
              📊 System Resources
              <span class="status-badge status-working">MONITORED</span>
            </h2>
            <div class="item">
              <span class="item-label">Uptime</span>
              <span class="item-value">${formatUptime(data.system.uptime_seconds)}</span>
            </div>
            <div class="item">
              <span class="item-label">Memory Usage</span>
              <span class="item-value">${data.system.memory_mb} MB</span>
            </div>
            <div class="item">
              <span class="item-label">Node.js Version</span>
              <span class="item-value">${data.system.node_version}</span>
            </div>
            <div class="item">
              <span class="item-label">Platform</span>
              <span class="item-value">${data.system.platform}</span>
            </div>
          </div>

          <div class="card">
            <h2>
              🔗 API Endpoints
              <span class="status-badge status-working">4/4 WORKING</span>
            </h2>
            <ul class="endpoint-list">
              <li><span class="endpoint-method">WS</span> /signal - WebSocket signaling</li>
              <li><span class="endpoint-method">GET</span> /turn-credentials - STUN config</li>
              <li><span class="endpoint-method">GET</span> /health - Health check</li>
              <li><span class="endpoint-method">GET</span> /check - This endpoint</li>
            </ul>
          </div>
        </div>

        <div class="status-full-table">
          <h2>✅ Feature Status (All Working)</h2>
      `;

      // Add all features
      for (const [key, feature] of Object.entries(data.features)) {
        const statusClass = feature.allowed ? 'working' : 'disabled';
        const statusText = feature.status.charAt(0).toUpperCase() + feature.status.slice(1);

        html += `
          <div class="feature-row ${statusClass}">
            <div>
              <div class="feature-name">✓ ${capitalizeWords(key.replace(/_/g, ' '))}</div>
              <div class="feature-details">${feature.description}</div>
        `;

        // Add feature-specific details
        if (key === 'rooms') {
          html += `<div class="feature-details">Max ${feature.max_peers_per_room} peers per room</div>`;
        } else if (key === 'rate_limiting') {
          html += `<div class="feature-details">${feature.limit}</div>`;
        } else if (key === 'grace_period') {
          html += `<div class="feature-details">${feature.duration_seconds}s disconnect tolerance</div>`;
        } else if (key === 'reconnect_tokens') {
          html += `<div class="feature-details">Expires in ${feature.ttl_seconds}s</div>`;
        } else if (key === 'room_expiry') {
          html += `<div class="feature-details">Auto cleanup after ${feature.expiry_seconds}s</div>`;
        }

        html += `
            </div>
            <span class="status-badge status-${statusClass === 'working' ? 'enabled' : 'disabled'}">
              ${statusText.toUpperCase()}
            </span>
          </div>
        `;
      }

      html += `
        </div>

        <div class="status-full-table">
          <h2>📋 Endpoint Details</h2>
      `;

      for (const [path, endpoint] of Object.entries(data.endpoints)) {
        html += `
          <div class="feature-row working">
            <div>
              <div class="feature-name"><code>${path}</code></div>
              <div class="feature-details">${endpoint.description}</div>
              <div class="feature-details">Type: ${endpoint.type}</div>
        `;

        if (path === '/signal') {
          html += `<div class="feature-details">Connected clients: ${endpoint.clients}</div>`;
        }

        html += `
            </div>
            <span class="status-badge status-enabled">ALLOWED</span>
          </div>
        `;
      }

      html += `
        </div>

        <div class="timestamp">
          Last checked: ${new Date(data.timestamp).toLocaleString()}<br>
          Browser: ${navigator.userAgent.substring(0, 50)}...
        </div>
      `;

      contentDiv.innerHTML = html;
    }

    function formatUptime(seconds) {
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);

      if (days > 0) return `${days}d ${hours}h ${minutes}m`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m ${seconds % 60}s`;
    }

    function capitalizeWords(str) {
      return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    // Load status on page load
    loadCheck();

    // Auto-refresh every 30 seconds
    setInterval(loadCheck, 30000);
  </script>
</body>
</html>
